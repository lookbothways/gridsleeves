<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Grid Drone</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500&display=swap" rel="stylesheet">
<style>
  :root{ --ink:#111; --bg:#fff; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; background:var(--bg); color:var(--ink);
    font-family:"Roboto",system-ui,sans-serif; font-weight:300; }
  body{ min-height:100vh; display:flex; flex-direction:column; align-items:center;
    justify-content:space-between; padding:28px 18px; }

  .top{ height:18px; }
  .countdown{ font-size:.72rem; color:#bdbdbd; text-transform:uppercase; letter-spacing:.16em;
    font-weight:300; font-variant-numeric:tabular-nums; }

  .mid{ flex:1 1 auto; display:flex; align-items:center; justify-content:center; width:100%; }
  svg{ width:100%; max-width:380px; height:auto; display:block; }
  .seg{ stroke:#fff; stroke-width:2.5; cursor:pointer; transition:opacity .35s ease; }
  .lbl{ pointer-events:none; fill:#fff; font-family:"Roboto",sans-serif;
    paint-order:stroke; stroke:rgba(0,0,0,.22); stroke-width:.6px; }
  .lbl .nm{ font-weight:400; font-size:13px; }
  .lbl .pc{ font-weight:300; font-size:11px; }
  .center-hit{ fill:#fff; cursor:pointer; }
  .center-txt{ pointer-events:none; fill:var(--ink); font-weight:300; font-size:15px;
    letter-spacing:.05em; text-anchor:middle; }

  .bottom{ width:240px; }
  .bottom input[type=range]{ width:100%; accent-color:rgba(0,0,0,.5); display:block; margin:9px 0; }
  .setname{ font-size:.64rem; color:#c2c2c2; text-transform:uppercase; letter-spacing:.18em; text-align:center; }
  .err{ margin-top:10px; font-size:.7rem; color:#b3261e; text-align:center; min-height:1em; }

  /* 99-slot note strip between donut and sliders */
  .dots{ width:100%; height:16px; position:relative; overflow:hidden; }
  .dot{ position:absolute; top:50%; width:9px; height:9px; border-radius:50%;
    transform:translate(-50%,-50%); pointer-events:none;
    animation:dotfade linear forwards; }
  @keyframes dotfade{ from{opacity:1} to{opacity:0} }
</style>
</head>
<body>
  <div class="top"><span class="countdown" id="countdown">updating in 00:10</span></div>

  <div class="mid">
    <svg id="donut" viewBox="0 0 360 360" aria-label="Energy mix">
      <g id="segs"></g>
      <g id="labels"></g>
      <circle class="center-hit" id="centerHit" cx="180" cy="180" r="86"></circle>
      <text class="center-txt" id="centerTxt" x="180" y="185">Play sound</text>
    </svg>
  </div>

  <div class="dots" id="dots"></div>

  <div class="bottom">
    <input type="range" id="loop" min="0" max="1000" value="500" aria-label="time window">
    <input type="range" id="set"  min="0" max="5" step="1" value="5" aria-label="instrument set">
    <div class="setname" id="setname">synth</div>
    <div id="tempoWrap" style="display:none">
      <input type="range" id="tempo" min="10" max="240" step="1" value="150" aria-label="tempo">
      <div class="setname" id="tempoLbl">tempo 150</div>
    </div>
    <div class="err" id="err"></div>
  </div>

<script>
/* ===================== instruments (C major pentatonic) ===================== */
const INSTRUMENTS = [
  { id:'nuclear', name:'Nuclear', freq:65.41,  wave:'triangle', cutoff:6, vibRate:4.2, vibDepth:5, trim:0.52, color:'#9b59b6' },
  { id:'coal',    name:'Coal',    freq:98.00,  wave:'sawtooth', cutoff:4, vibRate:3.8, vibDepth:5, trim:0.42, color:'#5b3a29' },
  { id:'hydro',   name:'Hydro',   freq:130.81, wave:'triangle', cutoff:6, vibRate:4.6, vibDepth:6, trim:0.50, color:'#2d6fd6' },
  { id:'biomass', name:'Biomass', freq:164.81, wave:'triangle', cutoff:7, vibRate:4.4, vibDepth:6, trim:0.46, color:'#9b2d2d' },
  { id:'wind',    name:'Wind',    freq:196.00, wave:'sawtooth', cutoff:6, vibRate:5.4, vibDepth:9, trim:0.40, color:'#19c4d4' },
  { id:'solar',   name:'Solar',   freq:220.00, wave:'sawtooth', cutoff:8, vibRate:5.0, vibDepth:8, trim:0.36, color:'#f2c200' },
  { id:'gas',     name:'Gas',     freq:293.66, wave:'sawtooth', cutoff:7, vibRate:5.2, vibDepth:7, trim:0.32, color:'#f5a623' },
];
const FUEL_MAP = { gas:'gas', coal:'coal', nuclear:'nuclear', biomass:'biomass', hydro:'hydro', solar:'solar', wind:'wind' };
const API = 'https://api.carbonintensity.org.uk';
const WINDOW_HOURS = 3;
const GAIN_EXP = 0.8;
const ampFromPct = p => Math.pow(Math.max(p,0)/100, GAIN_EXP);

/* ----- instrument SETS (extensible: add more here + a folder of <id>.wav) ----- */
const SET_DEFS = {
  synth:       { },                                      // built-in synth voices
  woodwind:    { dir:'samples/woodwind',    ext:'wav' }, // looping samples in pages root
  strings:     { dir:'samples/strings',     ext:'wav' },
  french_horn: { dir:'samples/french_horn', ext:'wav' },
  organ:       { dir:'samples/organ',       ext:'wav' },
  ensemble:    { ensemble:true },                        // piano/harp note engine (see below)
};
const SETS = ['synth','woodwind','strings','french_horn','organ','ensemble']; // slider left -> right
let currentSet = 'ensemble';
ENSEMBLE.bpm = 150;

const MODES = {
  live:  { loopMs: 10000,  label:null         },
  today: { loopMs: 60000,  label:'today'      },
  week:  { loopMs: 120000, label:'this week'  },
  month: { loopMs: 180000, label:'this month' },
  year:  { loopMs: 300000, label:'1 year'     },
};
let mode='week', loopMs=120000, loading=false, animating=true;

/* ===================== audio ===================== */
let ctx, master, wet, dry, reverb;
function initAudio(){
  if(ctx) return;
  ctx = new (window.AudioContext||window.webkitAudioContext)();
  master = ctx.createGain(); master.gain.value = 0.68;
  dry = ctx.createGain(); dry.gain.value = 0.82;
  wet = ctx.createGain(); wet.gain.value = 0.38;
  reverb = ctx.createConvolver(); reverb.buffer = makeImpulse(2.8, 2.4);
  master.connect(dry).connect(ctx.destination);
  master.connect(reverb).connect(wet).connect(ctx.destination);
}
function makeImpulse(sec,decay){
  const rate=ctx.sampleRate, len=Math.floor(rate*sec), buf=ctx.createBuffer(2,len,rate);
  for(let c=0;c<2;c++){ const d=buf.getChannelData(c);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,decay); }
  return buf;
}
class SynthVoice{
  constructor(I){ this.I=I; this.playing=false; }
  start(){ if(this.playing) return; this.playing=true; const I=this.I;
    this.g=ctx.createGain(); this.g.gain.value=0;
    this.flt=ctx.createBiquadFilter(); this.flt.type='lowpass';
    this.flt.frequency.value=I.freq*I.cutoff; this.flt.Q.value=0.6;
    this.flt.connect(this.g).connect(master);
    this.oscs=[]; [-6,0,6].forEach(det=>{ const o=ctx.createOscillator();
      o.type=I.wave; o.frequency.value=I.freq; o.detune.value=det; o.connect(this.flt); o.start(); this.oscs.push(o); });
    this.lfo=ctx.createOscillator(); this.lfo.frequency.value=I.vibRate;
    this.lfoG=ctx.createGain(); this.lfoG.gain.value=I.vibDepth;
    this.lfo.connect(this.lfoG); this.oscs.forEach(o=>this.lfoG.connect(o.detune)); this.lfo.start(); }
  setAmplitude(a){ if(this.playing) this.g.gain.setTargetAtTime(a*this.I.trim, ctx.currentTime, 0.08); }
  stop(){ if(!this.playing) return; this.playing=false; const t=ctx.currentTime;
    this.g.gain.cancelScheduledValues(t); this.g.gain.setValueAtTime(this.g.gain.value,t);
    this.g.gain.linearRampToValueAtTime(0,t+0.9);
    const oscs=this.oscs, lfo=this.lfo;
    setTimeout(()=>{ oscs.forEach(o=>{try{o.stop()}catch(e){}}); try{lfo.stop()}catch(e){} },1000); }
}
/* loops a sample; on any load failure it transparently falls back to the synth voice */
const BUFFERS = {};   // url -> AudioBuffer cache (loop-crossfaded)
/* equal-power crossfade of the tail into the head, then trim the tail -> click-free loop */
function makeLoopable(buf, fadeSec=0.25){
  const n=buf.length, sr=buf.sampleRate, f=Math.min(Math.floor(fadeSec*sr), Math.floor(n/2));
  const out=ctx.createBuffer(buf.numberOfChannels, n-f, sr);
  for(let c=0;c<buf.numberOfChannels;c++){
    const d=buf.getChannelData(c), o=out.getChannelData(c);
    o.set(d.subarray(0,n-f));
    for(let i=0;i<f;i++){ const t=i/f;
      o[i]=o[i]*Math.sqrt(t)+d[n-f+i]*Math.sqrt(1-t); }
  }
  return out;
}
class SampleVoice{
  constructor(I,url,offset){ this.I=I; this.url=url; this.offset=offset||0; this.playing=false; this.fb=null; }
  async start(){
    if(this.playing) return; this.playing=true;
    try{
      if(!BUFFERS[this.url]){ const r=await fetch(this.url); if(!r.ok) throw 0;
        BUFFERS[this.url]=makeLoopable(await ctx.decodeAudioData(await r.arrayBuffer())); }
    }catch(e){ this.fb=new SynthVoice(this.I); this.fb.start(); return; }
    if(!this.playing) return;
    this.g=ctx.createGain(); this.g.gain.value=0; this.g.connect(master);
    this.src=ctx.createBufferSource(); this.src.buffer=BUFFERS[this.url]; this.src.loop=true;
    this.src.connect(this.g); this.src.start(0, this.offset % this.src.buffer.duration);
  }
  setAmplitude(a){ if(this.fb) return this.fb.setAmplitude(a);
    if(this.playing&&this.g) this.g.gain.setTargetAtTime(a*this.I.trim, ctx.currentTime, 0.08); }
  stop(){ if(this.fb){ this.fb.stop(); this.fb=null; this.playing=false; return; }
    if(!this.playing) return; this.playing=false; if(!this.g) return; const t=ctx.currentTime;
    this.g.gain.cancelScheduledValues(t); this.g.gain.setValueAtTime(this.g.gain.value,t);
    this.g.gain.linearRampToValueAtTime(0,t+0.9); const s=this.src; setTimeout(()=>{try{s.stop()}catch(e){}},1000); }
}
function makeVoice(I){ const s=SET_DEFS[currentSet];
  const idx=INSTRUMENTS.findIndex(x=>x.id===I.id);
  return s.dir ? new SampleVoice(I, `${s.dir}/${I.id}.${s.ext}`, idx*1.0) : new SynthVoice(I); }

/* ===================== ensemble mode =====================
   Each fuel's % steers a note inside its own register zone, quantized to
   C major pentatonic (always consonant). Left hand (nuclear/coal/hydro) =
   piano chord re-struck each bar; right hand (biomass/wind/solar/gas) =
   harp notes cycling on the beats. Note gain follows the fuel's %.      */
const ENSEMBLE = {
  bpm: 60, chordEvery: 4, pctSpan: 50,   // 0..50% sweeps a full zone
  zones: {                                // pentatonic MIDI notes per fuel
    nuclear:[24,26,28,31,33,36,38,40],    // C1..E2
    coal:   [31,33,36,38,40,43,45],       // G1..A2
    hydro:  [36,38,40,43,45,48,50,52],    // C2..E3
    biomass:[48,50,52,55,57,60,62,64],    // C3..E4
    wind:   [55,57,60,62,64,67,69],       // G3..A4
    solar:  [60,62,64,67,69,72,74,76],    // C4..E5
    gas:    [67,69,72,74,76,79,81],       // G4..A5
  },
  left:['nuclear','coal','hydro'], right:['biomass','wind','solar','gas'],
};
const NOTE_NAMES=['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
const midiName = m => NOTE_NAMES[m%12]+(Math.floor(m/12)-1);
const ENS_DIRS = { piano:'samples/ensemble/piano', harp:'samples/ensemble/harp' };
const ENS_BUFFERS = {}; let ensLoaded=false, ensTimer=null, ensBeat=0;

async function ensLoad(){
  if(ensLoaded) return;
  const jobs=[];
  ENSEMBLE.left.forEach(id=>ENSEMBLE.zones[id].forEach(m=>jobs.push(['piano',m])));
  ENSEMBLE.right.forEach(id=>ENSEMBLE.zones[id].forEach(m=>jobs.push(['harp',m])));
  await Promise.all(jobs.map(async ([inst,m])=>{
    const k=inst+':'+m; if(ENS_BUFFERS[k]) return;
    try{ const r=await fetch(`${ENS_DIRS[inst]}/${midiName(m)}.mp3`); if(!r.ok) throw 0;
      ENS_BUFFERS[k]=await ctx.decodeAudioData(await r.arrayBuffer()); }
    catch(e){ setErr('ensemble sample missing: '+midiName(m)); }
  }));
  ensLoaded=true;
}
function ensNote(id){
  const p=amplitudeAt(id, Math.min(progress,1));
  const z=ENSEMBLE.zones[id], t=Math.min(Math.max(p,0),ENSEMBLE.pctSpan)/ENSEMBLE.pctSpan;
  return { midi:z[Math.round(t*(z.length-1))], p };
}
/* --- note dots: 99-slot imaginary keyboard strip --- */
const DOT_FADE_MS = 250;         // fade duration per struck note
const KEY0_MIDI   = 4;           // slot 0 = this MIDI note; centers our C1..A5 range
const N_SLOTS     = 99;
const FUEL_COLOR  = {}; INSTRUMENTS.forEach(I=>FUEL_COLOR[I.id]=I.color);
const dotsEl = document.getElementById('dots');
function noteDot(midi, color){
  const slot=Math.min(Math.max(midi-KEY0_MIDI,0),N_SLOTS-1);
  const d=document.createElement('span'); d.className='dot';
  d.style.left=((slot+0.5)/N_SLOTS*100)+'%';
  d.style.background=color; d.style.animationDuration=DOT_FADE_MS+'ms';
  dotsEl.appendChild(d);
  setTimeout(()=>d.remove(), DOT_FADE_MS+60);
}
function ensHit(inst, midi, gain, when, color){
  const buf=ENS_BUFFERS[inst+':'+midi]; if(!buf||gain<=0.003) return;
  const g=ctx.createGain(); g.gain.value=gain; g.connect(master);
  const s=ctx.createBufferSource(); s.buffer=buf; s.connect(g); s.start(when);
  if(color) noteDot(midi, color);
}
function ensBeatFn(){
  if(!playing||currentSet!=='ensemble') return;
  const t=ctx.currentTime+0.05, hum=()=>t+Math.random()*0.03;
  if(ensBeat%ENSEMBLE.chordEvery===0){
    ENSEMBLE.left.forEach(id=>{
      if(soloId&&soloId!==id) return;
      const {midi,p}=ensNote(id); ensHit('piano', midi, 1.8*ampFromPct(p), hum(), FUEL_COLOR[id]);
    });
  }
  const rid=ENSEMBLE.right[ensBeat%ENSEMBLE.right.length];
  if(!(soloId&&soloId!==rid)){
    const {midi,p}=ensNote(rid); ensHit('harp', midi, 2.2*ampFromPct(p), hum(), FUEL_COLOR[rid]);
  }
  ensBeat++;
}
function ensSetTimer(){
  clearInterval(ensTimer);
  ensTimer=setInterval(ensBeatFn, 60000/ENSEMBLE.bpm);
}
function ensStart(){
  ensBeat=0;
  ensLoad().then(()=>{ if(!playing||currentSet!=='ensemble') return;
    ensBeatFn(); ensSetTimer(); });
}
function ensStop(){ clearInterval(ensTimer); ensTimer=null; }

/* ===================== data ===================== */
let DATA = { curves:{}, points:0 };
const isoMin = d => d.toISOString().slice(0,16)+'Z';
function setErr(m){ document.getElementById('err').textContent = m||''; }

async function fetchGenRange(fromDate,toDate){
  const res=await fetch(`${API}/generation/${isoMin(fromDate)}/${isoMin(toDate)}`,{headers:{Accept:'application/json'}});
  if(!res.ok) throw new Error('HTTP '+res.status);
  return (await res.json()).data||[];
}
function rowsToCurves(rows){
  const c={}; INSTRUMENTS.forEach(I=>c[I.id]=[]);
  rows.forEach(r=>{ const b={}; (r.generationmix||[]).forEach(g=>{ if(FUEL_MAP[g.fuel]) b[FUEL_MAP[g.fuel]]=g.perc; });
    INSTRUMENTS.forEach(I=>c[I.id].push(b[I.id]??0)); });
  return c;
}
function downsample(curves,maxN){
  const ids=Object.keys(curves), n=curves[ids[0]]?.length||0; if(n<=maxN) return curves;
  const out={}; ids.forEach(id=>out[id]=[]); const step=n/maxN;
  for(let k=0;k<maxN;k++){ const a=Math.floor(k*step), b=Math.max(a+1,Math.floor((k+1)*step));
    ids.forEach(id=>{ let s=0,c=0; for(let j=a;j<b;j++){ s+=curves[id][j]; c++; } out[id].push(c?s/c:0); }); }
  return out;
}
async function fetchYear(){
  const now=new Date(), tasks=[];
  for(let m=11;m>=0;m--){
    const d=new Date(now.getFullYear(), now.getMonth()-m, 1, 12, 0);
    const end=new Date(d.getTime()+24*3600*1000);
    tasks.push(fetchGenRange(d,end).then(rows=>{
      const c=rowsToCurves(rows), pt={};
      INSTRUMENTS.forEach(I=>{ const arr=c[I.id]; pt[I.id]=arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:0; });
      return pt;
    }));
  }
  const pts=await Promise.all(tasks);
  const curves={}; INSTRUMENTS.forEach(I=>curves[I.id]=[]);
  pts.forEach(p=>INSTRUMENTS.forEach(I=>curves[I.id].push(p[I.id])));
  return curves;
}
function amplitudeAt(id,p){ const a=DATA.curves[id]; if(!a||!a.length) return 0; if(a.length===1) return a[0];
  const x=p*(a.length-1), i=Math.min(Math.floor(x),a.length-2), f=x-i, m=(1-Math.cos(f*Math.PI))/2;
  return a[i]*(1-m)+a[i+1]*m; }

let switchToken=0;
async function loadMode(m){
  const tok=++switchToken; mode=m; loading=true; setErr('');
  try{
    if(m==='live'){
      loopMs=MODES.live.loopMs;
      const now=new Date(), from=new Date(now.getTime()-WINDOW_HOURS*3600*1000);
      const rows=await fetchGenRange(from,now); if(tok!==switchToken) return;
      DATA={curves:rowsToCurves(rows), points:rows.length};
    } else if(m==='today'){
      loopMs=MODES.today.loopMs; const now=new Date(), mid=new Date(now); mid.setHours(0,0,0,0);
      const rows=await fetchGenRange(mid,now); if(tok!==switchToken) return;
      DATA={curves:downsample(rowsToCurves(rows),240), points:rows.length};
    } else if(m==='week'){
      loopMs=MODES.week.loopMs; const now=new Date(), from=new Date(now.getTime()-7*864e5);
      const rows=await fetchGenRange(from,now); if(tok!==switchToken) return;
      DATA={curves:downsample(rowsToCurves(rows),240), points:rows.length};
    } else if(m==='month'){
      loopMs=MODES.month.loopMs; const now=new Date(), from=new Date(now.getTime()-30*864e5);
      const rows=await fetchGenRange(from,now); if(tok!==switchToken) return;
      DATA={curves:downsample(rowsToCurves(rows),240), points:rows.length};
    } else if(m==='year'){
      loopMs=MODES.year.loopMs; const curves=await fetchYear(); if(tok!==switchToken) return;
      DATA={curves, points:12};
    }
    progress=0; loopStart=performance.now();
  }catch(e){ if(tok===switchToken) setErr('Could not load "'+(MODES[m].label||'live')+'": '+e.message); }
  finally{ if(tok===switchToken) loading=false; }
}

/* ===================== donut geometry ===================== */
const CX=180, CY=180, R_OUT=150, R_IN=88, R_MID=(R_OUT+R_IN)/2;
const pt=(r,a)=>[CX+r*Math.sin(a), CY-r*Math.cos(a)];
function annular(a0,a1){
  if(a1-a0 >= Math.PI*2-1e-4){
    return `M${CX},${CY-R_OUT} A${R_OUT},${R_OUT} 0 1 1 ${CX-0.01},${CY-R_OUT} Z `+
           `M${CX},${CY-R_IN} A${R_IN},${R_IN} 0 1 0 ${CX-0.01},${CY-R_IN} Z`;
  }
  const large=(a1-a0)>Math.PI?1:0;
  const [x0,y0]=pt(R_OUT,a0),[x1,y1]=pt(R_OUT,a1),[x2,y2]=pt(R_IN,a1),[x3,y3]=pt(R_IN,a0);
  return `M${x0},${y0} A${R_OUT},${R_OUT} 0 ${large} 1 ${x1},${y1} L${x2},${y2} A${R_IN},${R_IN} 0 ${large} 0 ${x3},${y3} Z`;
}
const SVGNS='http://www.w3.org/2000/svg';
const segG=document.getElementById('segs'), lblG=document.getElementById('labels');
const segEl={}, lblEl={};
INSTRUMENTS.forEach(I=>{
  const p=document.createElementNS(SVGNS,'path'); p.setAttribute('class','seg'); p.setAttribute('fill',I.color);
  p.addEventListener('click',()=>toggleSolo(I.id)); segG.appendChild(p); segEl[I.id]=p;
  const t=document.createElementNS(SVGNS,'text'); t.setAttribute('class','lbl'); t.setAttribute('text-anchor','middle');
  const nm=document.createElementNS(SVGNS,'tspan'); nm.setAttribute('class','nm'); nm.textContent=I.name;
  const pc=document.createElementNS(SVGNS,'tspan'); pc.setAttribute('class','pc');
  t.appendChild(nm); t.appendChild(pc); lblG.appendChild(t); lblEl[I.id]={t,nm,pc};
});

/* ===================== playback + render ===================== */
const voices={};
let playing=false, soloId=null, loopStart=0, progress=0;
const centerTxt=document.getElementById('centerTxt'), countdownEl=document.getElementById('countdown');
const fmtClock = s => String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');

async function play(){
  initAudio(); if(ctx.state==='suspended') await ctx.resume();
  if(!DATA.points){ await loadMode(mode); if(!DATA.points) return; }
  soloId=null;
  playing=true; loopStart=performance.now()-progress*loopMs;
  if(currentSet==='ensemble') ensStart();
  else INSTRUMENTS.forEach(I=>{ const v=makeVoice(I); voices[I.id]=v; v.start(); });
  centerTxt.textContent='Pause';
}
function stop(){
  playing=false; soloId=null; ensStop();
  Object.values(voices).forEach(v=>v.stop()); for(const k in voices) delete voices[k];
  centerTxt.textContent='Play sound';
}
function togglePlay(){ playing ? stop() : play(); }
async function toggleSolo(id){
  if(!playing){ await play(); soloId=id; return; }
  soloId = (soloId===id) ? null : id;
}
document.getElementById('centerHit').addEventListener('click', togglePlay);

/* switch instrument set live (rebuilds running voices) */
function applySet(name){
  if(name===currentSet) return; currentSet=name;
  document.getElementById('setname').textContent=name.replace(/_/g,' ');
  document.getElementById('tempoWrap').style.display = name==='ensemble' ? '' : 'none';
  if(playing){
    ensStop();
    Object.values(voices).forEach(v=>v.stop()); for(const k in voices) delete voices[k];
    if(name==='ensemble') ensStart();
    else INSTRUMENTS.forEach(I=>{ const v=makeVoice(I); voices[I.id]=v; v.start(); });
  }
}

function render(){
  const pcts={}; let total=0;
  INSTRUMENTS.forEach(I=>{ const v=amplitudeAt(I.id, Math.min(progress,1)); pcts[I.id]=v; total+=v; });
  if(total<=0) total=1;
  let ang=0;
  INSTRUMENTS.forEach(I=>{
    const frac=pcts[I.id]/total, a0=ang, a1=ang+frac*Math.PI*2; ang=a1;
    segEl[I.id].setAttribute('d', frac>0 ? annular(a0,a1) : '');
    segEl[I.id].style.opacity = (soloId && soloId!==I.id) ? 0.5 : 1;
    const mid=(a0+a1)/2, [lx,ly]=pt(R_MID,mid), L=lblEl[I.id];
    const show = frac>0.045 && pcts[I.id]>=0.5;
    L.t.style.display = show ? '' : 'none';
    if(show){
      L.t.setAttribute('x',lx); L.t.setAttribute('y',ly);
      L.nm.setAttribute('x',lx); L.nm.setAttribute('dy','-2');
      L.pc.setAttribute('x',lx); L.pc.setAttribute('dy','15'); L.pc.textContent=Math.round(pcts[I.id])+'%';
    }
  });
}
function topText(){
  if(mode==='live'){
    if(playing){ const remain=Math.max(0,loopMs-(performance.now()-loopStart)); countdownEl.textContent='updating in '+fmtClock(Math.ceil(remain/1000)); }
    else countdownEl.textContent='updating in '+fmtClock(Math.round(loopMs/1000));
  } else countdownEl.textContent = loading ? MODES[mode].label+' …' : MODES[mode].label;
}
function frame(){
  if(animating){
    progress=(performance.now()-loopStart)/loopMs;
    if(progress>=1){ progress=1;
      if(mode==='live'){ if(!loading) loadMode('live').then(()=>{ loopStart=performance.now(); progress=0; }); }
      else { loopStart=performance.now(); progress=0; }
    }
    if(playing) INSTRUMENTS.forEach(I=>{
      const amp=ampFromPct(amplitudeAt(I.id, Math.min(progress,1)));
      const target=(soloId && soloId!==I.id) ? 0 : amp;
      if(voices[I.id]) voices[I.id].setAmplitude(target);
    });
  }
  topText(); render();
  requestAnimationFrame(frame);
}

/* ===================== sliders ===================== */
const loopSlider=document.getElementById('loop');
loopSlider.addEventListener('input',()=>{
  const v=+loopSlider.value;
  const newMode = v<200?'live' : v<400?'today' : v<600?'week' : v<800?'month' : 'year';
  if(newMode!==mode) loadMode(newMode);
});
document.getElementById('set').addEventListener('input',e=>applySet(SETS[+e.target.value] || 'synth'));
document.getElementById('tempo').addEventListener('input',e=>{
  ENSEMBLE.bpm=+e.target.value;
  document.getElementById('tempoLbl').textContent='tempo '+ENSEMBLE.bpm;
  if(playing && currentSet==='ensemble' && ensTimer) ensSetTimer();
});

/* go */
document.getElementById('setname').textContent = 'ensemble';
document.getElementById('tempoWrap').style.display = '';
loadMode('week').then(()=>{ loopStart=performance.now(); progress=0; });
requestAnimationFrame(frame);
</script>
</body>
